// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 21
        compileSdkVersion = 34
        targetSdkVersion = 34

        // We use NDK 23 which has both M1 support and is the side-by-side NDK version from AGP.
        ndkVersion = "23.1.7779620"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("com.bugsnag:bugsnag-android-gradle-plugin:8.+")
    }
}

// The React Native Gradle plugin adds https://oss.sonatype.org/content/repositories/snapshots/
// as the first repository (so users on nightly/-SNAPSHOT builds could resolve them).
// OSSRH shut down in 2025 and now returns 504s, which aborts dependency resolution and breaks
// build.
// MediTrak depends only on released builds, so we make Gradle short-circuit the dead host.
allprojects {
    repositories {
        all { repo ->
            if (repo instanceof MavenArtifactRepository
                    && repo.url.toString().contains('oss.sonatype.org/content/repositories/snapshots')) {
                repo.mavenContent { snapshotsOnly() }
            }
        }
    }
}
