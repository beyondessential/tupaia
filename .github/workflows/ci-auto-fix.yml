name: Review Hero Auto-Fix
on:
  pull_request:
    # synchronize is needed so the workflow appears in PR status checks on every push
    types: [opened, synchronize, reopened, edited]

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    uses: beyondessential/review-hero/.github/workflows/auto-fix.yml@main
    secrets: inherit
