name: Set up Yarn
description: Install Corepack and enable Yarn via Corepack

runs:
  using: composite
  steps:
    - name: Install Corepack
      shell: bash
      run: |
        npm install --global --min-release-age=7 corepack
        echo "Corepack $(corepack --version)"
    - name: Set up Yarn
      shell: bash
      run: |
        corepack enable yarn
        corepack install
        echo "Yarn $(yarn --version)"
